version: '3.9'

services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: fastlink_app
    restart: always
    working_dir: /var/www/html
    env_file:
      - ./backend/.env.production
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - fastlink_net

  nginx:
    image: nginx:1.25-alpine
    container_name: fastlink_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend/public:/var/www/html/public:ro
      - ./backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/up || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - fastlink_net

  db:
    image: postgres:16-alpine
    container_name: fastlink_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fastlink_net

  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: fastlink_queue
    restart: always
    working_dir: /var/www/html
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    env_file:
      - ./backend/.env.production
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fastlink_net

volumes:
  pgdata:

networks:
  fastlink_net:
    driver: bridge